name: preflight
# PR/push gate on GitHub-hosted runners. Public repos get free unlimited
# Actions minutes — the fleet's "self-hosted always" rule is a cost
# optimization for private repos and actively wrong here: a self-hosted
# runner triggered by pull_request from a public repo lets any external PR
# (which runs the workflow file at the PR's HEAD, not master's) execute on
# the runner's host. Moved off krolik for that reason, not a cost call.
#
# History: this file previously ran a 3-version node matrix on
# ubuntu-latest AND triggered on `main` while the repo's default branch is
# `master` — so it never ran at all and every PR showed zero checks
# (silent no-CI). Then moved to self-hosted/krolik single-node. Now back to
# ubuntu-latest, single node, now that the repo is public.
#
# Private repo on the free plan had no branch-protection enforcement; the
# gate was procedural (never merge a red preflight). Public repos get
# branch protection free — worth enabling separately.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm install --global "$(node -p 'require("./package.json").packageManager')"
      - run: node -v && npm -v
      - run: npm ci
      - run: npm run build
      - run: npm run check
