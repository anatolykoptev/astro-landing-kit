# Automated releases via release-please.
#
# Flow (no manual version/tag steps):
#   1. Land conventional commits on `master` (feat:/fix:/perf:/docs:/... — breaking
#      via `!` or a `BREAKING CHANGE:` footer — this repo's history already uses
#      conventional-commit prefixes).
#   2. release-please opens/updates a "chore(master): release X.Y.Z" PR that bumps
#      package.json + prepends CHANGELOG.md from those commits.
#   3. Merging that PR creates the `vX.Y.Z` tag + GitHub Release.
#
# Single package (astro-landing-kit) → plain vX.Y.Z tags
# (include-component-in-tag:false), same shape as oxpulse-sfu-kit's config.
#
# Versioning: 0.x pre-1.0 (bump-minor-pre-major + bump-patch-for-minor-pre-major) —
# feat/fix bump PATCH, a breaking change bumps MINOR. Do NOT `git tag` by hand:
# a manual tag desyncs .release-please-manifest.json.
#
# Publish job: npm Trusted Publishing (OIDC, no stored token — id-token: write
# is the only credential; npm CLI resolves the short-lived identity itself on
# `npm publish`). Requires ONE ONE-TIME manual step the operator must do on
# npmjs.com (cannot be scripted): package Settings → Trusted Publisher →
# GitHub org "anatolykoptev", repo "astro-landing-kit", workflow filename
# "release-please.yml", allowed action "npm publish". Until that's configured,
# this job will fail with an auth error — expected, not a workflow bug; the
# very first publish establishing the package on the registry must be a
# manual `npm publish` from an authenticated local session (trusted-publisher
# config requires the package to already exist).
#
# Runner: GitHub-hosted (ubuntu-latest) — public repos get free unlimited
# Actions minutes, and this workflow's release-please job holds
# contents:write + pull-requests:write. Keeping that off a self-hosted
# runner that a public-repo PR could otherwise reach.

name: release-please

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm install --global "$(node -p 'require("./package.json").packageManager')"
      - run: node -v && npm -v
      - run: npm ci
      - run: npm publish
